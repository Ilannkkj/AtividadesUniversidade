<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula - 31-03-26</title>
</head>
<body>
    <h1>Calculadora de Abastecimento</h1>
    <hr>
    <p>EScolha o tipo de combustível</p>
    <ul>
        <li>Gasolina: R$ 6.67</li>
        <li>Etanol: R$ 5.75</li>
        <li>Diesel: R$ 6.10</li>
    </ul>

    <form id="formCombustivel">
        <label for="">Tipo Combustível</label>
        <select name="combustivel" id="combustivel">
            <option value="">Escolha uma opção</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>
        <label for="">Quantidade (Litros)</label>
        <input type="number" id="litros" step="0.1" min="0" max="110">
    </form>
    
    <h2>Resultado:</h2>
    <p>R$ <span id="resultado"></span></p>

    <script src="script.js"></script>
</body>
</html>
